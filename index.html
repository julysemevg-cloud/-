<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инструменты рассылки</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:32px 16px 60px;color:#1a1a1a}
.wrap{max-width:480px;margin:0 auto}
.hdr{text-align:center;margin-bottom:32px}
.hdr-logo{width:64px;height:64px;background:linear-gradient(135deg,#FF9800,#F57C00);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px}
.hdr h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.hdr p{font-size:14px;color:#888}
.grid{display:flex;flex-direction:column;gap:12px}
.tool-card{background:#fff;border:1px solid #e8e8e8;border-radius:16px;padding:18px 20px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:16px;transition:transform 0.15s,box-shadow 0.15s}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.09)}
.tool-card:active{transform:scale(0.99)}
.tool-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.icon-orange{background:#fff3e0}
.icon-blue{background:#e3f2fd}
.icon-green{background:#e8f5e9}
.icon-red{background:#fce4ec}
.tool-info{flex:1}
.tool-title{font-size:16px;font-weight:600;margin-bottom:4px}
.tool-desc{font-size:13px;color:#999;line-height:1.4}
.tool-arrow{color:#ccc;font-size:20px;flex-shrink:0}
.footer{text-align:center;margin-top:32px;font-size:12px;color:#bbb}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-logo">📡</div>
    <h1>Инструменты рассылки</h1>
    <p>Telegram-уведомления для команды</p>
  </div>

  <div class="grid">

    <a class="tool-card" href="sozvon.html">
      <div class="tool-icon icon-orange">📞</div>
      <div class="tool-info">
        <div class="tool-title">Созвон 10:00</div>
        <div class="tool-desc">Напоминание о срочных платежах</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

    <a class="tool-card" href="speckurs.html">
      <div class="tool-icon icon-green">💱</div>
      <div class="tool-info">
        <div class="tool-title">Спецкурс</div>
        <div class="tool-desc">Рассылка курсов USD, EUR, CNY</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

    <a class="tool-card" href="kurscb.html">
      <div class="tool-icon icon-red">🏦</div>
      <div class="tool-info">
        <div class="tool-title">Курс ЦБ</div>
        <div class="tool-desc">Официальные курсы ЦБ на дату</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

    <a class="tool-card" href="gdyn.html">
      <div class="tool-icon icon-blue">⏳</div>
      <div class="tool-info">
        <div class="tool-title">Ждунчики 14:00</div>
        <div class="tool-desc">Рассылка напоминания в 14:00</div>
      </div>
      <div class="tool-arrow">›</div>
    </a>

  </div>

  <div class="footer">julysemevg-cloud · GitHub Pages</div>

</div>
</body>
</html>
